<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prijava - NOVI MAGACIN</title>
    <style>
        :root {
            --primary: #2563eb;
            --danger: #dc2626;
            --gray: #64748b;
            --gray-light: #e2e8f0;
            --surface: #ffffff;
            --bg: #f8fafc;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
        }
        .card {
            width: 100%;
            max-width: 420px;
            background: var(--surface);
            border: 1px solid var(--gray-light);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }
        h1 {
            margin: 0 0 16px 0;
            font-size: 22px;
        }
        label {
            display: block;
            font-size: 13px;
            color: var(--gray);
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--gray-light);
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 15px;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .hint {
            margin-top: 12px;
            font-size: 12px;
            color: var(--gray);
        }
        .error {
            color: var(--danger);
            font-size: 13px;
            margin: 8px 0;
        }
    </style>
    <script src="js/config.js"></script>
    <script src="js/login.js" defer></script>
</head>
<body>
    <div class="card">
        <h1>Prijava</h1>
        <div id="error" class="error" style="display:none;"></div>
        <label for="apiUrl">API URL</label>
        <input type="text" id="apiUrl" placeholder="https://tvoj-backend">
        <label for="username">Korisničko ime</label>
        <input type="text" id="username" autocomplete="username">
        <label for="password">Lozinka</label>
        <input type="password" id="password" autocomplete="current-password">
        <button id="loginBtn">Prijavi se</button>
        <div class="hint">
            Default admin: <b>admin / admin</b>
        </div>
    </div>
</body>
</html>
